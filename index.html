    <!-- Overwrite JS (Button Groups) -->
      <script>
        // Store original HTML for each button
        const rows = document.querySelectorAll('#buttonRow .col-4');
        const originalHTML = Array.from(rows).map(btn => btn.innerHTML);

        const pageSize = 6;
        const totalButtons = rows.length;
        const totalPages = Math.ceil(totalButtons / pageSize);
        let currentPage = 1;

        // ✅ LocalStorage key
        const MS_KEY = "multisearch_last_engine";

        function saveLastEngine(actionURL, placeholderText, queryParam) {
          try {
            const checked = document.querySelector('input[name="searchOption"]:checked');
            const payload = {
              id: checked ? checked.id : null,
              actionURL,
              placeholderText,
              queryParam
            };
            localStorage.setItem(MS_KEY, JSON.stringify(payload));
          } catch (e) {}
        }

        function applyLastEngine() {
          try {
            const raw = localStorage.getItem(MS_KEY);
            if (!raw) return;

            const data = JSON.parse(raw);
            if (!data) return;

            // If radio exists, check it
            if (data.id) {
              const radio = document.getElementById(data.id);
              if (radio) radio.checked = true;
            }

            // Apply form settings
            const form = document.getElementById('searchForm');
            const input = document.getElementById('searchInput');
            if (form && input) {
              form.action = data.actionURL || form.action;
              input.placeholder = data.placeholderText || input.placeholder;
              input.name = data.queryParam || input.name;
            }
          } catch (e) {}
        }

        // ✅ Your function: now also saves last selected engine
        function changeSearch(actionURL, placeholderText, queryParam) {
          const form = document.getElementById('searchForm');
          const input = document.getElementById('searchInput');

          form.action = actionURL;
          input.placeholder = placeholderText;
          input.name = queryParam;

          // ✅ save selection
          saveLastEngine(actionURL, placeholderText, queryParam);
        }

        function navigate(direction) {
          currentPage += direction;
          currentPage = Math.max(1, Math.min(currentPage, totalPages));
          showPage(currentPage);

          // ✅ after DOM changes, re-apply saved selection
          applyLastEngine();
        }

        function showPage(page) {
          // Hide all first
          rows.forEach((button, index) => {
            button.style.display = 'none';
            button.style.position = 'absolute';
            button.innerHTML = originalHTML[index]; // Restore original content
          });

          const start = (page - 1) * pageSize;
          const end = Math.min(page * pageSize, totalButtons);

          for (let i = start; i < end; i++) {
            rows[i].style.display = 'block';
            rows[i].style.position = 'relative';
          }

          // Insert navigation buttons
          if (start > 0) {
            rows[start].innerHTML = `<label class="btn-grid" onclick="navigate(-1)"><i class="fa-solid fa-arrow-left"></i></label>`;
          }
          if (end < totalButtons) {
            rows[end - 1].innerHTML = `<label class="btn-grid" onclick="navigate(1)"><i class="fa-solid fa-arrow-right"></i></label>`;
          }
        }

        function adjustLayout() {
          const isMobile = window.matchMedia('(max-width: 768px)').matches;

          if (!isMobile) {
            // Desktop: restore all original buttons
            rows.forEach((button, index) => {
              button.style.display = 'block';
              button.style.position = 'relative';
              button.innerHTML = originalHTML[index];
            });
          } else {
            currentPage = 1;
            showPage(currentPage);
          }

          // ✅ after layout rebuild, re-apply last selection
          applyLastEngine();
        }

        window.addEventListener('load', () => {
          adjustLayout();
          applyLastEngine(); // ✅ restore on page load
        });

        window.addEventListener('resize', () => {
          setTimeout(adjustLayout, 100);
        });
      </script>
